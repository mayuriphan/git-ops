apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/mayuriphan/git-ops.git
    targetRevision: main
    path: apps/idp

  destination:
    server: https://kubernetes.default.svc
    namespace: idp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true