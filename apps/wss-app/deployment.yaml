apiVersion: apps/v1
kind: Deployment
metadata:
  name: wss-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wss-ap
  template:
    metadata:
      labels:
        app: wss-ap
    spec:
      containers:
      - name: wss-app
        image: 187457215475.dkr.ecr.ap-south-1.amazonaws.com/wss-app:16b09954e1ca7026d1d07544dccbb86c35e7fa13
        ports:
        - containerPort: 80